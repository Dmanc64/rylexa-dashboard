<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#10B981"/>
  <!-- Calligraphic script R - wide open swooping top -->
  <!-- Upstroke from bottom-left, sweeping up -->
  <path d="M14 52 C16 44 18 32 21 22 C23 16 25 12 27 10"
    stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Top swoosh: wide arc from top of upstroke curving far right and back down -->
  <path d="M27 10 C32 6 40 5 47 8 C53 11 54 18 52 24 C50 30 44 34 38 36 C33 37 28 36 24 34"
    stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar extending to the left -->
  <path d="M24 34 L8 40"
    stroke="black" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- Leg sweeping down to lower-right -->
  <path d="M28 36 C33 42 40 48 50 55"
    stroke="black" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
